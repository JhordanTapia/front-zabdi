<div class="min-h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black font-sans relative overflow-hidden">
  
  <!-- Efectos de luces de fondo (Glows) -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-600/10 rounded-full blur-[100px]"></div>

  <!-- Tarjeta del Login (Efecto Vidrio / Glassmorphism) -->
  <div class="relative bg-slate-800/40 backdrop-blur-xl p-10 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] w-full max-w-md border border-slate-700/50 z-10">
    
    <!-- Header y Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-cyan-400 mb-5 shadow-[0_0_20px_rgba(6,182,212,0.4)]">
        <!-- Ícono de Escudo Naval -->
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 tracking-tight">ASTILLERO NAVAL</h1>
      <p class="text-slate-400 mt-2 text-sm font-medium tracking-wide">Plataforma de Presupuestos</p>
    </div>

    <!-- Formulario -->
    <form class="space-y-6">
      
      <!-- Input Correo (Dark Mode) -->
      <div class="space-y-2">
        <label class="text-slate-300 text-xs font-bold uppercase tracking-wider ml-1" for="email">
          Correo Electrónico
        </label>
        <div class="relative">
          <input 
            id="email" 
            type="email" 
            [(ngModel)]="email" 
            name="email"
            placeholder="usuario@astillero.com"
            class="w-full pl-4 pr-10 py-3.5 rounded-xl bg-slate-900/80 text-white border border-slate-700 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600 shadow-inner"
          >
        </div>
      </div>

      <!-- Input Contraseña (Dark Mode) -->
      <div class="space-y-2">
        <label class="text-slate-300 text-xs font-bold uppercase tracking-wider ml-1" for="password">
          Contraseña
        </label>
        <input 
          id="password" 
          type="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="••••••••"
          class="w-full px-4 py-3.5 rounded-xl bg-slate-900/80 text-white border border-slate-700 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600 shadow-inner"
        >
      </div>

      <!-- Extras: Recordarme y Olvidé Clave -->
      <div class="flex items-center justify-between text-sm mt-2">
        <label class="flex items-center text-slate-400 hover:text-slate-200 cursor-pointer transition-colors">
          <input type="checkbox" class="mr-2 rounded border-slate-700 bg-slate-900 text-cyan-500 focus:ring-cyan-500 focus:ring-offset-slate-800">
          Recordarme
        </label>
        <a href="#" class="text-cyan-400 hover:text-cyan-300 transition-colors font-semibold">¿Olvidaste tu clave?</a>
      </div>

      <!-- Botón Ingresar (Neón) -->
      <button 
        type="button"
        (click)="ingresar()"
        class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold py-4 px-4 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)] transition-all duration-300 transform hover:-translate-y-1 mt-6">
        Ingresar al Sistema
      </button>
    </form>

    <!-- Footer -->
    <div class="mt-8 text-center border-t border-slate-700/50 pt-6">
      <p class="text-xs text-slate-500 font-medium">v1.0.0 &copy; 2026 Soluciones Navales SAC</p>
    </div>

  </div>
</div>
